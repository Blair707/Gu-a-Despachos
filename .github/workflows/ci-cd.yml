name: CI/CD - Build, Push y Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/guias-despacho
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build y Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Ejecutar tests
        run: mvn test -B -f guias-despacho/guias-despacho/pom.xml
      - name: Build JAR
        run: mvn clean package -DskipTests -B -f guias-despacho/guias-despacho/pom.xml

  docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: guias-despacho/guias-despacho
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop guias-despacho || true
            docker rm guias-despacho || true
            docker pull ${{ env.DOCKER_IMAGE }}:latest
            docker run -d \
              --name guias-despacho \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /mnt/efs/guias:/mnt/efs/guias \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }} \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              ${{ env.DOCKER_IMAGE }}:latest
