# ================================
# Servidor
# ================================
server.port=8080

# ================================
# Base de datos MySQL
# ================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:guias_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# AWS S3
# ================================
aws.s3.bucket-name=guias-despacho-bucket-b707
aws.s3.region=us-east-1
aws.access-key=
aws.secret-key=

# ================================
# EFS - Almacenamiento temporal
# ================================
app.efs.base-path=${EFS_MOUNT_PATH:/mnt/efs/guias}

