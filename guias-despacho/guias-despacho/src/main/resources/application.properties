# ================================
# Servidor
# ================================
server.port=8080

# ================================
# Base de datos MySQL
# ================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:guias_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# AWS S3
# ================================
aws.s3.bucket-name=${AWS_S3_BUCKET:guias-despacho-bucket}
aws.s3.region=${AWS_REGION:us-east-1}
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}

# ================================
# EFS - Almacenamiento temporal
# ================================
app.efs.base-path=${EFS_MOUNT_PATH:/mnt/efs/guias}

# ================================
# SpringDoc / Swagger
# ================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
